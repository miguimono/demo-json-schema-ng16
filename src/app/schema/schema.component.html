<div id="schema">
  <div class="schema-component">
    <ng-container *ngIf="legendVisible">
      <div class="schema-legend">
        <div class="legend-header">
          <h3>{{ legendTitle }}</h3>
          <span class="legend-accent-key" *ngIf="effectiveAccentByKey as key">
            Clave de acento: <code>{{ key }}</code>
          </span>
        </div>

        <ul class="legend-list">
          <li
            class="legend-item"
            *ngFor="let it of legendItems; trackBy: trackLegendItem"
          >
            <span
              class="legend-dot"
              [style.backgroundColor]="legendColorMap[it.color]"
              [style.borderColor]="legendColorMap[it.color]"
              aria-hidden="true"
            ></span>
            <span class="legend-text" [style.color]="legendColorMap[it.color]">
              {{ it.text }}
            </span>
          </li>
        </ul>
      </div>
    </ng-container>

    <div class="schema-wrapper">
      <schema
        [data]="schemeData"
        [settings]="resolvedSettings"
        [cardTemplate]="cardTemplate"
      ></schema>
    </div>

    <section
      class="schema-debug-grid"
      *ngIf="showJsonDebugSection || showSchemaInputsDebugSection"
    >
      <article class="debug-card" *ngIf="showJsonDebugSection">
        <header class="debug-card-header">
          <h4>JSON (`data`)</h4>
        </header>
        <pre class="debug-pre">{{ debugDataJson }}</pre>
      </article>

      <article class="debug-card" *ngIf="showSchemaInputsDebugSection">
        <header class="debug-card-header">
          <h4>Payload enviado al schema</h4>
          <p>`settings`, `cardTemplate`</p>
        </header>
        <pre class="debug-pre">{{ debugSchemaInputsJson }}</pre>
      </article>
    </section>
  </div>
</div>
