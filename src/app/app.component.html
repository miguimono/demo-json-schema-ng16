<div class="playground-shell" *ngIf="isBrowser; else loadingTpl">
  <app-config-banner
    class="config-module"
    [defaultJsonObject]="defaultJsonObject"
    (schemaSettingsChange)="onSettingsChange($event)"
    (renderDataChange)="onRenderDataChange($event)"
  ></app-config-banner>

  <main class="content-column">
    <app-title-module
      [title]="schemaTitle"
      [subtitle]="'Version de libreria: ' + schemaLibraryVersion"
    ></app-title-module>

    <section class="schema-module">
      <app-schema
        [schemeData]="renderData"
        [schemaSettings]="settingsFormModel"
        [descriptionShowColorTrue]="'true'"
        [descriptionShowColorFalse]="'false'"
        [descriptionShowColorNull]="'null'"
      ></app-schema>
    </section>
  </main>
</div>

<ng-template #loadingTpl>
  <p>Cargando visualizador...</p>
</ng-template>
